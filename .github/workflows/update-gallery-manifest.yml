name: Update gallery manifest

on:
  push:
    paths:
      - "images/portfolio/**"
      - "images/testimonials/**"
  workflow_dispatch:
  schedule:
    # Reshuffle the portfolio photo order once a day.
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Generate portfolio manifest.json
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const base = "images/portfolio";
          const exts = new Set([".jpg", ".jpeg", ".png", ".webp"]);
          const manifest = {};

          // Fisher-Yates shuffle so the display order isn't just camera/upload order.
          // Re-run on every push to images/portfolio/** and on a daily schedule (see cron below),
          // so the order keeps changing over time.
          function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
          }

          for (const entry of fs.readdirSync(base, { withFileTypes: true })) {
            if (!entry.isDirectory()) continue;
            const dir = path.join(base, entry.name);
            const files = shuffle(
              fs
                .readdirSync(dir)
                .filter((f) => exts.has(path.extname(f).toLowerCase()))
            );
            manifest[entry.name] = files.map((f) => `${base}/${entry.name}/${f}`);
          }

          const sorted = Object.keys(manifest)
            .sort()
            .reduce((acc, key) => {
              acc[key] = manifest[key];
              return acc;
            }, {});

          fs.writeFileSync(
            path.join(base, "manifest.json"),
            JSON.stringify(sorted, null, 2) + "\n"
          );
          EOF

      - name: Generate testimonials manifest.json
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const base = "images/testimonials";
          const exts = new Set([".jpg", ".jpeg", ".png", ".webp"]);

          const files = fs
            .readdirSync(base)
            .filter((f) => exts.has(path.extname(f).toLowerCase()))
            .sort()
            .map((f) => `${base}/${f}`);

          fs.writeFileSync(
            path.join(base, "manifest.json"),
            JSON.stringify(files, null, 2) + "\n"
          );
          EOF

      # Commits via the Contents API instead of raw git commands, so GitHub signs
      # the commit itself and it shows up as "Verified" (a plain `git commit` +
      # `git push` from the runner never is, regardless of the configured author).
      - name: Commit manifests if changed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const branch = context.ref.replace("refs/heads/", "");
            const files = [
              "images/portfolio/manifest.json",
              "images/testimonials/manifest.json",
            ];

            for (const path of files) {
              const newContent = fs.readFileSync(path, "utf8");

              let sha;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path,
                  ref: branch,
                });
                sha = data.sha;
                const existing = Buffer.from(data.content, "base64").toString("utf8");
                if (existing === newContent) {
                  console.log(`${path} unchanged, skipping.`);
                  continue;
                }
              } catch (err) {
                if (err.status !== 404) throw err;
                sha = undefined; // file doesn't exist yet
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                message: "chore: update gallery manifests",
                content: Buffer.from(newContent).toString("base64"),
                sha,
                branch,
              });
              console.log(`${path} updated.`);
            }
